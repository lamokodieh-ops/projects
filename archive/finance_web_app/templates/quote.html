{% extends "layout.html" %}

{% block title %}Quote{% endblock %}

{% block main %}
<h1 class="zf-page-title">Get a quote</h1>
<p class="zf-page-sub">Live price via Alpha Vantage, with short-term cache and backup quotes.</p>
<div class="zf-card zf-form-card">
    <form action="/quote" method="post">
        <div class="mb-4">
            <label class="form-label text-secondary small" for="symbol">Symbol</label>
            <input autocomplete="off" autofocus class="form-control text-uppercase" id="symbol" name="symbol" placeholder="e.g. MSFT" type="text" required>
        </div>
        <button class="btn zf-btn-primary w-100" type="submit">Get quote</button>
    </form>
</div>
{% endblock %}
