{% extends "layout.html" %}

{% block title %}Quote{% endblock %}

{% block main %}
<h1 class="zf-page-title">Quote result</h1>
<p class="zf-page-sub">{{ stock.name }}</p>

<div class="zf-card" style="max-width: 480px;">
    <div class="d-flex justify-content-between align-items-start mb-2">
        <span class="zf-symbol fs-4">{{ stock.symbol }}</span>
        <span class="zf-badge-source">
            {% if stock.cached %}cached · {% endif %}{{ stock.source or "live" }}
        </span>
    </div>
    <div class="zf-quote-price mb-3">{{ stock.price | usd }}</div>
    <div class="d-flex gap-2">
        <a class="btn zf-btn-primary" href="/buy">Buy {{ stock.symbol }}</a>
        <a class="btn btn-outline-light" href="/quote">Another quote</a>
    </div>
</div>
{% endblock %}
