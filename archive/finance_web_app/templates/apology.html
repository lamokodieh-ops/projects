{% extends "layout.html" %}

{% block title %}Error{% endblock %}

{% block main %}
<div class="zf-card zf-apology text-center mx-auto" style="max-width: 520px;">
    <h1 class="zf-page-title">Something went wrong</h1>
    <p class="zf-page-sub">{{ top }} — {{ bottom | replace('-', ' ') | replace('~q', '?') | replace('~p', '%') }}</p>
    <img alt="{{ top }}" class="img-fluid mb-3" src="https://api.memegen.link/images/custom/{{ top | urlencode }}/{{ bottom | urlencode }}.jpg?background=https://i.imgur.com/CsCgN7Ll.png&width=400" title="{{ top }}">
    <div>
        <a class="btn zf-btn-primary" href="/">Back to portfolio</a>
    </div>
</div>
{% endblock %}
