{% extends "layout.html" %}

{% block title %}Deposit{% endblock %}

{% block main %}
<h1 class="zf-page-title">Deposit cash</h1>
<p class="zf-page-sub">Add simulated funds to your account.</p>
<div class="zf-card zf-form-card">
    <form action="/deposit" method="post">
        <div class="mb-4">
            <label class="form-label text-secondary small" for="deposit">Amount (USD)</label>
            <input autocomplete="off" autofocus class="form-control" id="deposit" min="1" name="deposit" placeholder="e.g. 1000" type="number" required>
        </div>
        <button class="btn zf-btn-primary w-100" type="submit">Deposit</button>
    </form>
</div>
{% endblock %}
