{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block main %}
<div class="zf-auth-shell">
    <div class="zf-card zf-form-card w-100">
        <h1 class="zf-page-title">Create account</h1>
        <p class="zf-page-sub mb-4">Start with simulated cash and build a portfolio.</p>
        <form action="/register" method="post">
            <div class="mb-3">
                <label class="form-label text-secondary small" for="username">Username</label>
                <input autocomplete="username" autofocus class="form-control" id="username" name="username" placeholder="Username" type="text" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small" for="password">Password</label>
                <input autocomplete="new-password" class="form-control" id="password" name="password" placeholder="Password" type="password" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small" for="confirmation">Confirm password</label>
                <input autocomplete="new-password" class="form-control" id="confirmation" name="confirmation" placeholder="Retype password" type="password" required>
            </div>
            <button class="btn zf-btn-primary w-100" type="submit">Register</button>
        </form>
        <p class="text-center mt-3 mb-0"><a class="zf-btn-ghost" href="/login">Already have an account?</a></p>
    </div>
</div>
{% endblock %}
