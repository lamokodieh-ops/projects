{% extends "layout.html" %}

{% block title %}Sell{% endblock %}

{% block main %}
<h1 class="zf-page-title">Sell shares</h1>
<p class="zf-page-sub">Close or trim a position from your holdings.</p>
<div class="zf-card zf-form-card">
    {% if portfolio %}
        <form action="/sell" method="post">
            <div class="mb-3">
                <label class="form-label text-secondary small" for="symbol">Symbol</label>
                <select class="form-select" id="symbol" name="symbol" required>
                    <option disabled selected value="">Select stock</option>
                    {% for stock in portfolio %}
                        <option value="{{ stock.symbol }}">{{ stock.symbol }} ({{ stock.shares }} owned)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small" for="shares">Shares</label>
                <input autocomplete="off" autofocus class="form-control" id="shares" min="1" name="shares" placeholder="Number of shares" type="number" required>
            </div>
            <button class="btn zf-btn-primary w-100" type="submit">Sell</button>
        </form>
    {% else %}
        <div class="zf-empty mb-0">
            <p class="mb-0">Nothing to sell yet. <a href="/buy">Buy shares</a> first.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
