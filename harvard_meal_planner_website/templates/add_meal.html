{% extends "index.html" %}

{% block title %}Add Meal - Meal Planner{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Add New Meal</h2>
        <form method="POST" action="{{ url_for('add_meal') }}">
            <div class="form-group">
                <label for="meal_type">Meal Type *</label>
                <select id="meal_type" name="meal_type" required>
                    <option value="">Select meal type</option>
                    {% for meal_type in meal_types %}
                    <option value="{{ meal_type }}" {% if default_meal_type == meal_type %}selected{% endif %}>{{ meal_type|title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="meal_name">Meal Name *</label>
                <input type="text" id="meal_name" name="meal_name" required 
                       placeholder="e.g., Grilled Chicken Salad"
                       value="{{ default_meal_name }}">
            </div>
            <div class="form-group">
                <label for="meal_date">Date *</label>
                <input type="date" id="meal_date" name="meal_date" value="{{ default_date }}" required>
            </div>
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <textarea id="description" name="description" rows="3" placeholder="Add any notes about this meal..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group half">
                    <label for="rating">Rating</label>
                    <div class="star-rating-input" id="ratingInput">
                        <input type="hidden" name="rating" id="rating" value="0">
                        {% for i in range(1, 6) %}
                        <span class="star-input" data-value="{{ i }}">☆</span>
                        {% endfor %}
                    </div>
                </div>
                <div class="form-group half">
                    <label class="checkbox-label inline">
                        <input type="checkbox" name="is_favorite">
                        <span class="checkbox-text">❤️ Add to favorites</span>
                    </label>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Meal</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
